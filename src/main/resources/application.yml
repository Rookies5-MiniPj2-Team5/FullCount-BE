spring:
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  security:
    user:
      name: admin
      password: admin

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:fullcount-default-secret-key-for-jwt-256bits-min}
    access-token-expiry: 3600000       # 1시간
    refresh-token-expiry: 604800000    # 7일

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # 경로 수정: mem -> file
    # ~/fullcountdb 는 사용자 홈 디렉토리에 fullcountdb.mv.db 파일로 저장하겠다는 의미입니다.
    url: jdbc:h2:file:~/fullcountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      # 중요: 매번 새로 만들지 않도록 update로 변경 (첫 실행시에만 create 혹은 update)
      ddl-auto: update
    defer-datasource-initialization: true
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://localhost:3306/fullcount?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
