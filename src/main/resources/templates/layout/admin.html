<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>풀카운트 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #1a1a2e; }
        .sidebar a { color: #e0e0e0; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover { background-color: #16213e; color: #fff; }
        .sidebar .brand { color: #e94560; font-size: 1.5rem; font-weight: bold; padding: 20px; }
        .main-content { padding: 20px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 사이드바 -->
        <div class="col-md-2 sidebar p-0">
            <div class="brand">⚾ Full Count</div>
            <nav>
                <a th:href="@{/admin/dashboard}">📊 대시보드</a>
                <a th:href="@{/admin/members}">👥 회원 관리</a>
                <a th:href="@{/admin/transfers}">💳 거래 모니터링</a>
            </nav>
        </div>
        <!-- 메인 콘텐츠 -->
        <div class="col-md-10 main-content">
            <div th:replace="~{::content}"></div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
