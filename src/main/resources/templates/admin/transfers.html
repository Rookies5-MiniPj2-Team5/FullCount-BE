<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>거래 모니터링 - 풀카운트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #1a1a2e; }
        .sidebar a { color: #e0e0e0; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #16213e; color: #fff; }
        .sidebar .brand { color: #e94560; font-size: 1.4rem; font-weight: bold; padding: 20px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="brand">⚾ Full Count</div>
            <nav class="mt-2">
                <a th:href="@{/admin/dashboard}">📊 대시보드</a>
                <a th:href="@{/admin/members}">👥 회원 관리</a>
                <a th:href="@{/admin/transfers}" class="active">💳 거래 모니터링</a>
            </nav>
        </div>
        <div class="col-md-10 p-4">
            <h2 class="mb-4 fw-bold">💳 거래 모니터링</h2>
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>게시글</th>
                            <th>양도자</th>
                            <th>양수자</th>
                            <th>금액</th>
                            <th>상태</th>
                            <th>생성일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${transfers}">
                            <td th:text="${t.id}"></td>
                            <td th:text="${t.post.title}"></td>
                            <td th:text="${t.seller.nickname}"></td>
                            <td th:text="${t.buyer != null ? t.buyer.nickname : '-'}"></td>
                            <td th:text="${#numbers.formatInteger(t.price, 0, 'COMMA') + '원'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${t.status.name() == 'COMPLETED'} ? 'bg-success' :
                                                      (${t.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-warning text-dark')"
                                      th:text="${t.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(t.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                        </tbody>
                    </table>

                    <nav th:if="${transfers.totalPages > 1}">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${transfers.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/transfers(page=${transfers.number - 1})}">이전</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, transfers.totalPages - 1)}"
                                th:classappend="${i == transfers.number} ? 'active'">
                                <a class="page-link" th:href="@{/admin/transfers(page=${i})}" th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${transfers.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/transfers(page=${transfers.number + 1})}">다음</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
