<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('양도 거래 관리')}"></head>
<body>
<div class="admin-shell">
    <header th:replace="~{admin/fragments :: nav('transfers')}"></header>

    <main class="admin-main">
        <div class="page-header">
            <div>
                <h1>양도 거래 관리</h1>
                <p>거래 상태를 검색하고, 티켓 전달, 완료, 취소를 관리자 권한으로 처리합니다.</p>
            </div>
        </div>

        <div th:replace="~{admin/fragments :: alerts}"></div>

        <section class="panel">
            <form method="get" th:action="@{/admin/transfers}" th:object="${transferFilter}">
                <div class="filter-bar">
                    <div>
                        <input type="text" th:field="*{keyword}" placeholder="글 제목, 판매자, 구매자 검색">
                        <p class="field-error" th:if="${#fields.hasErrors('keyword')}" th:errors="*{keyword}"></p>
                    </div>
                    <select th:field="*{status}">
                        <option value="">전체 상태</option>
                        <option th:each="item : ${transferStatuses}" th:value="${item}" th:text="${item}"></option>
                    </select>
                </div>
                <div class="btn-row">
                    <button class="btn btn-primary" type="submit">검색</button>
                    <a class="btn btn-light" th:href="@{/admin/transfers}">초기화</a>
                </div>
            </form>
        </section>

        <section class="panel" style="margin-top: 18px;">
            <div class="filter-help" th:if="${keyword != null and !#strings.isEmpty(keyword)}">
                현재 검색어: <strong th:text="${keyword}"></strong>
            </div>

            <div class="table-wrap">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>거래 글</th>
                        <th>참여자</th>
                        <th>가격</th>
                        <th>상태</th>
                        <th>생성일</th>
                        <th>관리 액션</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="transfer : ${transfers.content}">
                        <td th:text="${transfer.id}">1</td>
                        <td>
                            <strong th:utext="${@adminSearchHighlighter.highlight(transfer.post.title, keyword)}">양도 글</strong>
                            <div class="muted" th:text="${transfer.post.seatArea != null ? transfer.post.seatArea : '좌석 정보 없음'}">좌석 정보</div>
                        </td>
                        <td>
                            <div>판매자 <strong th:utext="${@adminSearchHighlighter.highlight(transfer.seller.nickname, keyword)}">seller</strong></div>
                            <div class="muted" th:utext="${transfer.buyer != null ? '구매자 ' + @adminSearchHighlighter.highlight(transfer.buyer.nickname, keyword) : '구매자 미지정'}">구매자 미지정</div>
                        </td>
                        <td th:text="|${#numbers.formatInteger(transfer.price, 0, 'COMMA')}원|">10,000원</td>
                        <td>
                            <span class="badge-pill"
                                  th:classappend="${transfer.status.name() == 'COMPLETED'} ? ' tone-success' :
                                                  (${transfer.status.name() == 'CANCELLED'} ? ' tone-danger' :
                                                  (${transfer.status.name() == 'TICKET_SENT'} ? ' tone-primary' : ' tone-warning'))"
                                  th:text="${transfer.status}">REQUESTED</span>
                        </td>
                        <td th:text="${#temporals.format(transfer.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-02 09:00</td>
                        <td>
                            <div class="action-stack">
                                <form th:if="${transfer.status.name() == 'PAYMENT_COMPLETED'}"
                                      method="post" th:action="@{|/admin/transfers/${transfer.id}/ticket-sent|}">
                                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-primary" type="submit">티켓 전달</button>
                                </form>
                                <form th:if="${transfer.status.name() != 'COMPLETED' and transfer.status.name() != 'CANCELLED' and transfer.status.name() != 'REQUESTED'}"
                                      method="post" th:action="@{|/admin/transfers/${transfer.id}/complete|}">
                                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-success" type="submit">완료 처리</button>
                                </form>
                                <form th:if="${transfer.status.name() != 'COMPLETED' and transfer.status.name() != 'CANCELLED'}"
                                      method="post" th:action="@{|/admin/transfers/${transfer.id}/cancel|}">
                                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-danger" type="submit">취소 처리</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${transfers.isEmpty()}">
                        <td colspan="7" class="empty-state">검색 조건에 맞는 거래가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${transfers.totalPages > 1}">
                <a th:classappend="${transfers.first} ? ' is-disabled'"
                   th:href="@{/admin/transfers(page=${transfers.number - 1}, keyword=${keyword}, status=${status})}">이전</a>
                <th:block th:each="i : ${#numbers.sequence(0, transfers.totalPages - 1)}">
                    <a th:classappend="${i == transfers.number} ? ' is-active'"
                       th:href="@{/admin/transfers(page=${i}, keyword=${keyword}, status=${status})}"
                       th:text="${i + 1}">1</a>
                </th:block>
                <a th:classappend="${transfers.last} ? ' is-disabled'"
                   th:href="@{/admin/transfers(page=${transfers.number + 1}, keyword=${keyword}, status=${status})}">다음</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
