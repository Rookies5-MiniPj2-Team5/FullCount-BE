<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('게시글 관리')}"></head>
<body>
<div class="admin-shell">
    <header th:replace="~{admin/fragments :: nav('posts')}"></header>

    <main class="admin-main">
        <div class="page-header">
            <div>
                <h1>게시글 관리</h1>
                <p>게시판 종류와 상태를 함께 필터링하고, 운영 기준에 맞지 않는 게시글을 관리합니다.</p>
            </div>
        </div>

        <div th:replace="~{admin/fragments :: alerts}"></div>

        <section class="panel">
            <form method="get" th:action="@{/admin/posts}" th:object="${postFilter}">
                <div class="filter-bar">
                    <div>
                        <input type="text" th:field="*{keyword}" placeholder="제목, 내용, 작성자 검색">
                        <p class="field-error" th:if="${#fields.hasErrors('keyword')}" th:errors="*{keyword}"></p>
                    </div>
                    <select th:field="*{boardType}">
                        <option value="">전체 게시판</option>
                        <option th:each="item : ${boardTypes}" th:value="${item}" th:text="${item}"></option>
                    </select>
                    <select th:field="*{status}">
                        <option value="">전체 상태</option>
                        <option th:each="item : ${postStatuses}" th:value="${item}" th:text="${item}"></option>
                    </select>
                </div>
                <div class="btn-row">
                    <button class="btn btn-primary" type="submit">검색</button>
                    <a class="btn btn-light" th:href="@{/admin/posts}">초기화</a>
                </div>
            </form>
        </section>

        <section class="panel" style="margin-top: 18px;">
            <div class="filter-help" th:if="${keyword != null and !#strings.isEmpty(keyword)}">
                현재 검색어: <strong th:text="${keyword}"></strong>
            </div>

            <div class="table-wrap">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>게시글</th>
                        <th>작성자</th>
                        <th>분류</th>
                        <th>상태</th>
                        <th>경기일</th>
                        <th>관리 액션</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${posts.content}">
                        <td th:text="${post.id}">1</td>
                        <td>
                            <strong th:utext="${@adminSearchHighlighter.highlight(post.title, keyword)}">제목</strong>
                            <div class="muted" th:utext="${@adminSearchHighlighter.highlight(#strings.abbreviate(post.content, 80), keyword)}">내용</div>
                        </td>
                        <td>
                            <div th:utext="${@adminSearchHighlighter.highlight(post.author.nickname, keyword)}">작성자</div>
                            <div class="muted" th:text="${post.author.email}">email@example.com</div>
                        </td>
                        <td>
                            <span class="badge-pill tone-primary" th:text="${post.boardType}">CREW</span>
                        </td>
                        <td>
                            <span class="badge-pill"
                                  th:classappend="${post.status.name() == 'OPEN'} ? ' tone-success' : (${post.status.name() == 'RESERVED'} ? ' tone-warning' : ' tone-neutral')"
                                  th:text="${post.status}">OPEN</span>
                        </td>
                        <td th:text="${post.matchDate != null ? #temporals.format(post.matchDate, 'yyyy-MM-dd') : '-'}">-</td>
                        <td>
                            <div class="action-stack">
                                <form method="post" th:action="@{|/admin/posts/${post.id}/delete|}">
                                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-danger" type="submit">삭제</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${posts.isEmpty()}">
                        <td colspan="7" class="empty-state">검색 조건에 맞는 게시글이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${posts.totalPages > 1}">
                <a th:classappend="${posts.first} ? ' is-disabled'"
                   th:href="@{/admin/posts(page=${posts.number - 1}, keyword=${keyword}, boardType=${boardType}, status=${status})}">이전</a>
                <th:block th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}">
                    <a th:classappend="${i == posts.number} ? ' is-active'"
                       th:href="@{/admin/posts(page=${i}, keyword=${keyword}, boardType=${boardType}, status=${status})}"
                       th:text="${i + 1}">1</a>
                </th:block>
                <a th:classappend="${posts.last} ? ' is-disabled'"
                   th:href="@{/admin/posts(page=${posts.number + 1}, keyword=${keyword}, boardType=${boardType}, status=${status})}">다음</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
