<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('회원 관리')}"></head>
<body>
<div class="admin-shell">
    <header th:replace="~{admin/fragments :: nav('members')}"></header>

    <main class="admin-main">
        <div class="page-header">
            <div>
                <h1>회원 관리</h1>
                <p>검색, 상태 필터, 권한 변경, 계정 비활성화와 삭제를 한 화면에서 처리합니다.</p>
            </div>
        </div>

        <div th:replace="~{admin/fragments :: alerts}"></div>

        <section class="panel">
            <form method="get" th:action="@{/admin/members}" th:object="${memberFilter}">
                <div class="filter-bar">
                    <div>
                        <input type="text" th:field="*{keyword}" placeholder="이메일 또는 닉네임 검색">
                        <p class="field-error" th:if="${#fields.hasErrors('keyword')}" th:errors="*{keyword}"></p>
                    </div>
                    <select th:field="*{active}">
                        <option value="">전체 상태</option>
                        <option value="true">활성</option>
                        <option value="false">비활성</option>
                    </select>
                    <select th:field="*{role}">
                        <option value="">전체 권한</option>
                        <option th:each="item : ${roles}" th:value="${item}" th:text="${item}"></option>
                    </select>
                </div>
                <div class="btn-row">
                    <button class="btn btn-primary" type="submit">검색</button>
                    <a class="btn btn-light" th:href="@{/admin/members}">초기화</a>
                </div>
            </form>
        </section>

        <section class="panel" style="margin-top: 18px;">
            <div class="filter-help" th:if="${keyword != null and !#strings.isEmpty(keyword)}">
                현재 검색어: <strong th:text="${keyword}"></strong>
            </div>

            <div class="table-wrap">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>회원</th>
                        <th>소속 / 매너</th>
                        <th>권한</th>
                        <th>상태</th>
                        <th>가입일</th>
                        <th>관리 액션</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="member : ${members.content}">
                        <td th:text="${member.id}">1</td>
                        <td>
                            <strong th:utext="${@adminSearchHighlighter.highlight(member.nickname, keyword)}">닉네임</strong>
                            <div class="muted" th:utext="${@adminSearchHighlighter.highlight(member.email, keyword)}">email@example.com</div>
                        </td>
                        <td>
                            <div th:text="${member.team != null ? member.team.name : '무소속'}">무소속</div>
                            <div class="muted" th:text="|매너 ${#numbers.formatDecimal(member.mannerTemperature, 1, 1)}도|">매너 36.5도</div>
                        </td>
                        <td>
                            <span class="badge-pill"
                                  th:classappend="${member.role.name() == 'ADMIN'} ? ' tone-danger' : ' tone-primary'"
                                  th:text="${member.role}">USER</span>
                        </td>
                        <td>
                            <span class="badge-pill"
                                  th:classappend="${member.isActive} ? ' tone-success' : ' tone-warning'"
                                  th:text="${member.isActive ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</span>
                        </td>
                        <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-02 09:00</td>
                        <td>
                            <div class="action-stack">
                                <form th:if="${member.isActive}" method="post" th:action="@{|/admin/members/${member.id}/deactivate|}">
                                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-warning" type="submit">비활성화</button>
                                </form>
                                <form th:if="${!member.isActive}" method="post" th:action="@{|/admin/members/${member.id}/activate|}">
                                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-success" type="submit">활성화</button>
                                </form>
                                <form method="post" th:action="@{|/admin/members/${member.id}/role|}">
                                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                                    <input type="hidden" name="role" th:value="${member.role.name() == 'ADMIN' ? 'USER' : 'ADMIN'}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-light" type="submit"
                                            th:text="${member.role.name() == 'ADMIN' ? '일반 권한으로 변경' : '관리자 승격'}">관리자 승격</button>
                                </form>
                                <form method="post" th:action="@{|/admin/members/${member.id}/delete|}">
                                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-danger" type="submit">삭제</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${members.isEmpty()}">
                        <td colspan="7" class="empty-state">검색 조건에 맞는 회원이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${members.totalPages > 1}">
                <a th:classappend="${members.first} ? ' is-disabled'"
                   th:href="@{/admin/members(page=${members.number - 1}, keyword=${keyword}, active=${active}, role=${role})}">이전</a>
                <th:block th:each="i : ${#numbers.sequence(0, members.totalPages - 1)}">
                    <a th:classappend="${i == members.number} ? ' is-active'"
                       th:href="@{/admin/members(page=${i}, keyword=${keyword}, active=${active}, role=${role})}"
                       th:text="${i + 1}">1</a>
                </th:block>
                <a th:classappend="${members.last} ? ' is-disabled'"
                   th:href="@{/admin/members(page=${members.number + 1}, keyword=${keyword}, active=${active}, role=${role})}">다음</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
