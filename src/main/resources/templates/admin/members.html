<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 관리 - 풀카운트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #1a1a2e; }
        .sidebar a { color: #e0e0e0; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #16213e; color: #fff; }
        .sidebar .brand { color: #e94560; font-size: 1.4rem; font-weight: bold; padding: 20px; border-bottom: 1px solid #333; }
        .badge-ROOKIE { background-color: #6c757d; }
        .badge-PRO { background-color: #0d6efd; }
        .badge-ALL_STAR { background-color: #fd7e14; }
        .badge-LEGEND { background-color: #dc3545; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="brand">⚾ Full Count</div>
            <nav class="mt-2">
                <a th:href="@{/admin/dashboard}">📊 대시보드</a>
                <a th:href="@{/admin/members}" class="active">👥 회원 관리</a>
                <a th:href="@{/admin/transfers}">💳 거래 모니터링</a>
            </nav>
        </div>
        <div class="col-md-10 p-4">
            <h2 class="mb-4 fw-bold">👥 회원 관리</h2>
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>이메일</th>
                            <th>닉네임</th>
                            <th>응원 팀</th>
                            <th>뱃지</th>
                            <th>매너 온도</th>
                            <th>역할</th>
                            <th>가입일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="member : ${members}">
                            <td th:text="${member.id}"></td>
                            <td th:text="${member.email}"></td>
                            <td th:text="${member.nickname}"></td>
                            <td th:text="${member.team != null ? member.team.name : '-'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="'badge-' + ${member.badgeLevel}"
                                      th:text="${member.badgeLevel}"></span>
                            </td>
                            <td th:text="${#numbers.formatDecimal(member.mannerTemperature, 1, 1)} + '°'"></td>
                            <td th:text="${member.role}"></td>
                            <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd')}"></td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- 페이지네이션 -->
                    <nav th:if="${members.totalPages > 1}">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${members.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/members(page=${members.number - 1})}">이전</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, members.totalPages - 1)}"
                                th:classappend="${i == members.number} ? 'active'">
                                <a class="page-link" th:href="@{/admin/members(page=${i})}" th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${members.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/members(page=${members.number + 1})}">다음</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
