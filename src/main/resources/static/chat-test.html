<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>WebSocket Chat Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>채팅 테스트</h2>

<div>
    <label>Room ID: <input id="roomId" value="1" /></label><br/>
    <label>Sender ID: <input id="senderId" value="2" /></label><br/>
    <label>Message: <input id="content" value="구매자 테스트 메시지" /></label><br/>
    <button onclick="connect()">연결</button>
    <button onclick="subscribeRoom()">구독</button>
    <button onclick="sendMessage()">전송</button>
</div>

<hr/>
<div id="log"></div>

<script>
    let stompClient = null;

    function log(message) {
        const div = document.getElementById("log");
        div.innerHTML += `<p>${message}</p>`;
    }

    function connect() {
        const socket = new SockJS("http://localhost:8080/ws");
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            log("연결 성공: " + frame);
        }, function(error) {
            log("연결 실패: " + error);
        });
    }

    function subscribeRoom() {
        const roomId = document.getElementById("roomId").value;

        stompClient.subscribe("/topic/chat/" + roomId, function(message) {
            log("수신: " + message.body);
        });

        log("구독 완료: /topic/chat/" + roomId);
    }

    function sendMessage() {
        const roomId = document.getElementById("roomId").value;
        const senderId = Number(document.getElementById("senderId").value);
        const content = document.getElementById("content").value;

        stompClient.send("/app/chat/" + roomId, {}, JSON.stringify({
            senderId: senderId,
            content: content
        }));

        log("전송 완료");
    }
</script>
</body>
</html>
